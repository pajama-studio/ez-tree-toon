<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>EZ Tree Toon | Toon Tree & Normal Baker</title>
    <meta
      name="description"
      content="A Three.js toon tree generator with stylized normal baking, cel lighting, outlines, LODs and GLB export."
    />
    <!-- SEO Meta Tags -->
    <meta
      name="keywords"
      content="toon tree generator, normal baking, cel shading, procedural generation, Three.js"
    />
    <meta name="author" content="Daniel Greenheck, Pajama Studio" />
    <meta
      property="og:title"
      content="EZ Tree Toon | Toon Tree & Normal Baker"
    />
    <meta
      property="og:description"
      content="Create procedural toon trees and export stylized baked normals."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="EZ Tree Toon | Toon Tree & Normal Baker"
    />
    <meta
      name="twitter:description"
      content="Create procedural toon trees and export stylized baked normals."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>

  <body>
    <div id="loading-screen">
      <div id="logo" class="loading-brand">EZ TREE <span>TOON</span></div>
      <div id="loading-text">LOADING... 0%</div>
    </div>

    <div id="root">
      <img
        id="about-icon"
        class="about-icon"
        src="/icons/icon_about.png"
        onclick="showAbout()"
      />
      <img
        id="audio-status"
        class="audio-icon"
        src="/icons/icon_playing.png"
        onclick="toggleAudio()"
      />
      <div id="app"></div>
      <div id="ui-container"></div>

      <div id="aboutOverlay" class="overlay">
        <div class="about-dialog">
          <div class="about-brand">EZ TREE <span>TOON</span></div>
          <h1>EZ Tree Toon</h1>
          <h2>Toon Tree & Normal Baker</h2>
          <h3>
            Original generator by Daniel Greenheck · Toon adaptation by Pajama
            Studio
          </h3>

          <div class="social-icons">
            <a
              href="mailto:dan.greenheck@drgsoftwaresolutions.com"
              target="_blank"
              class="social-icon email"
              ><i class="fas fa-envelope"></i
            ></a>
            <a
              href="https://github.com/dgreenheck"
              target="_blank"
              class="social-icon github"
              ><i class="fab fa-github"></i
            ></a>
            <a
              href="https://www.youtube.com/channel/UCrdx_EU_Wx8_uBfqO0cI-9Q"
              target="_blank"
              class="social-icon youtube"
              ><i class="fab fa-youtube"></i
            ></a>
            <a
              href="https://www.x.com/dangreenheck"
              target="_blank"
              class="social-icon twitter"
              ><i class="fab fa-x"></i
            ></a>
            <a
              href="https://www.linkedin.com/in/danielgreenheck/"
              target="_blank"
              class="social-icon linkedin"
              ><i class="fab fa-linkedin"></i
            ></a>
          </div>
          <button class="close-button" onclick="closeAbout()">CLOSE</button>
        </div>
      </div>
    </div>

    <a id="downloadLink" style="display: none"></a>

    <!-- Used for file uploads -->
    <input type="file" id="fileInput" accept=".json" style="display: none" />

    <audio id="background-audio" loop>
      <source src="/audio/ambience.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>

    <script type="module" src="./main.js"></script>
    <script>
      function showAbout() {
        document.getElementById('aboutOverlay').classList.add('active');
      }

      function closeAbout() {
        document.getElementById('aboutOverlay').classList.remove('active');
      }
    </script>
  </body>
</html>
